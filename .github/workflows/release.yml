name: Release SDK

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --no-package-lock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN }}
          CITADEL_RELEASE_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN }}

      - name: Build
        run: npm run build

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.CITADEL_RELEASE_TOKEN}}
      
      - name: Trigger Publish Workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CITADEL_RELEASE_TOKEN }}" \
            https://api.github.com/repos/citadel-app/citadel-plugin-sdk/dispatches \
            -d '{"event_type": "trigger-publish"}'
